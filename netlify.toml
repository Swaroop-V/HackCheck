[build]
  command = "npm run build"
  publish = "build"
  functions = "netlify/functions"

# This rule proxies all API requests to your serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# THIS IS THE CRITICAL FIX FOR YOUR REACT APP
# It tells Netlify to serve index.html for any path that is not a file
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200